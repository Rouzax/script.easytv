# Structurally synced with script.easymovie/mkdocs.yml. Keep parallel; per-addon
# site_name, site_url, repo_url, repo_name, edit_uri, and nav are addon-specific.
# Theme block, palette toggle structure, features list, and markdown_extensions
# stay byte-identical across both repos.
site_name: EasyTV
site_url: https://rouzax.github.io/script.easytv/docs/
site_description: "EasyTV, channel-surfing for your Kodi TV show library"
repo_url: https://github.com/Rouzax/script.easytv
repo_name: Rouzax/script.easytv
edit_uri: edit/main/docs/

site_dir: build/docs

theme:
  name: material
  logo: assets/icon.png
  favicon: assets/icon.png
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - toc.integrate
    - search.highlight
    - search.suggest
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.action.edit
  icon:
    repo: fontawesome/brands/github

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
  - md_in_html

# docs/plans/ is gitignored, but `mkdocs build` will warn about untracked .md
# files not in nav. exclude_docs prevents the warning and keeps plan content
# out of any local builds.
exclude_docs: |
  plans/
  smart-playlists/

nav:
  - Home: index.md
  - Installation: installation.md
  - Core Features:
      - Browse Mode: browse-mode.md
      - Random Playlist Mode: random-playlist-mode.md
      - Random Order Shows: random-order-shows.md
  - Configuration:
      - Settings Reference: settings-reference.md
      - Smart Playlist Integration: smart-playlist-integration.md
      - Smart Playlist Examples: smart-playlist-examples.md
  - Advanced:
      - Clones: clones.md
      - Episode Export: episode-export.md
      - Auto-Generated Playlists: auto-generated-playlists.md
      - Multi-Instance Sync: multi-instance-sync.md
  - Troubleshooting & FAQ: troubleshooting-and-faq.md
